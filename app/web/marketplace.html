<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMGPUB Marketplace</title>

<link rel="stylesheet" href="css/style.css">

<style>
.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
}

.filter{
text-align:center;
margin:20px;
}

audio{
width:100%;
margin:10px 0;
}
</style>

</head>
<body>

<header>
<h2>SMGPUB℠ Marketplace</h2>
<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<h1>Browse Beats & Products</h1>
<p>Find licenses, kits, and digital assets</p>
</section>

<!-- FILTER -->
<div class="filter">
<button onclick="loadProducts()">All</button>
<button onclick="filterType('beat')">Beats</button>
<button onclick="filterType('digital')">Kits</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid"></div>

<script src="js/api.js"></script>
<script src="js/checkout.js"></script>

<script>

let allProducts = [];

// LOAD PRODUCTS
async function loadProducts(){
allProducts = await get("/products");
render(allProducts);
}

// FILTER
function filterType(type){
const filtered = allProducts.filter(p => p.type === type);
render(filtered);
}

// RENDER
function render(data){
document.getElementById("products").innerHTML =
data.map(p => `
<div class="card">
<h3>${p.id}</h3>

${p.audio ? `<audio controls src="${p.audio}"></audio>` : ""}

<p>$${p.price}</p>

<button onclick="buy('${p.id}')">Buy</button>
</div>
`).join('');
}

loadProducts();

</script>

</body>
</html>
