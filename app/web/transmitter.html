<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMGPUB™ Guitar Transmitter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>🎸 SMGPUB™ Guitar Rig</h1>

  <button id="startBtn">Start Streaming</button>
  <p id="status">Status: Idle</p>

  <div class="controls">
    <label>Gain</label>
    <input type="range" id="gain" min="0" max="5" step="0.1" value="2">

    <label>Distortion</label>
    <input type="range" id="dist" min="0" max="500" value="200">
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
